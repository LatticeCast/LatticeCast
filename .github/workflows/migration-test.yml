name: Migration Test

on:
  push:
    paths:
      - "migration/**"

  workflow_dispatch:

jobs:
  migration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install psycopg2-binary sqlfluff

      - name: Run migration tests
        env:
          TEST_PG_HOST: localhost
          TEST_PG_PORT: "5433"
        run: python migration/migrate.py --test-only
