services:
  lattice-cast:
    image: nginx:alpine
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      LISTEN_PORT: ${BACKEND_PORT}
      BACKEND_PORT: ${BACKEND_PORT}
      FRONTEND_PORT: ${FRONTEND_PORT}
    depends_on:
      - frontend
      - backend
    networks:
      - shared-network

  frontend:
    build:
      context: ./frontend
      args:
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - AUTHENTIK_URL=${AUTHENTIK_URL}
        - AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}

    env_file:
      - .env
    networks:
      - shared-network
    command: npm run dev
    tty: true
    stdin_open: true

  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/:/app/
    env_file:
      - .env
    environment:
      POSTGRES_URL: db:5432
      REDIS_URL: redis://valkey:6379/0
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - shared-network
      - app-network

  db:
    image: postgres:18
    restart: always
    command: >
      postgres
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql.log
      -c log_statement=all
      -c log_connections=on
      -c log_disconnections=on
    environment:
      POSTGRES_USER: dba_user
      POSTGRES_PASSWORD: dba_pws
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dba_user -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # See Skill(developing-db-sql) for migration commands (lint/test/apply/hash).
  migration:
    profiles:
      - migration
    build:
      context: ./migration
    environment:
      DATABASE_URL: postgresql://dba_user:dba_pws@db:5432/${POSTGRES_DB}
      TEST_NETWORK: latticecast_app-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./migration:/jetbase
    command: ["python", "migrate.py"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  valkey:
    image: valkey/valkey:8-alpine
    restart: always
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    restart: always
    volumes:
      - .minio_data:/data
    env_file:
      - .env
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network


  backend-test:
    profiles:
      - test
    build:
      context: ./backend
    volumes:
      - ./backend/tests:/app/tests:ro
    env_file:
      - .env
    environment:
      BASE_URL: http://lattice-cast:${BACKEND_PORT}
    depends_on:
      - lattice-cast
    networks:
      - shared-network
    command: ["python", "tests/run_all_tests.py"]

  browser:
    profiles:
      - browser
    build:
      context: ./browser
    user: "1000:1000"
    network_mode: host
    volumes:
      - ./.browser:/output
    environment:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    tty: true
    stdin_open: true

networks:
  app-network:
    driver: bridge

  shared-network:
    external: true

volumes:
  db_data:
  valkey_data:
