services:
  lattice-cast:
    image: nginx:alpine
    restart: always
    ports:
      - "${NGX_PORT}:${NGX_PORT}"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      LISTEN_PORT: ${NGX_PORT}
      NGX_PORT: ${NGX_PORT}
    depends_on:
      - frontend
      - backend
    networks:
      - shared-network

  frontend:
    build:
      context: ./frontend
      args:
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - AUTHENTIK_URL=${AUTHENTIK_URL}
        - AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}
    restart: always
    env_file:
      - .env
    networks:
      - shared-network
    command: npm run dev
    tty: true
    stdin_open: true
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
    restart: always
    volumes:
      - ./backend/:/app/
      - /app/.venv
    env_file:
      - .env
    environment:
      POSTGRES_URL: db:5432
      REDIS_URL: redis://valkey:6379/0
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - shared-network
      - app-network

  db:
    image: postgres:18
    restart: always
    command: >
      postgres
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql.log
      -c log_statement=all
      -c log_connections=on
      -c log_disconnections=on
    environment:
      POSTGRES_USER: dba_user
      POSTGRES_PASSWORD: dba_pws
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "15432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dba_user -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # See Skill(developing-db-sql) for migration commands (lint/test/apply/hash).
  migration:
    profiles:
      - migration
    build:
      context: ./migration
    environment:
      DATABASE_URL: postgresql://dba_user:dba_pws@db:5432/${POSTGRES_DB}
      TEST_NETWORK: latticecast_app-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./migration:/jetbase
    command: ["python", "migrate.py"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  valkey:
    image: valkey/valkey:8-alpine
    restart: always
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    restart: always
    volumes:
      - .minio_data:/data
    env_file:
      - .env
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # E2E test runner — uv image, has Playwright (client lib) + requests.
  # No browsers installed here; chromium runs in the `browser` service
  # and test-e2e connects to it via `sync_playwright().chromium.connect()`.
  test-e2e:
    profiles:
      - test
    build:
      context: ./test-e2e
    volumes:
      - ./test-e2e:/scripts
    env_file:
      - .env
    environment:
      BASE_URL: http://lattice-cast:${NGX_PORT}
      # Playwright server endpoint on the browser service:
      BROWSER_WS: ws://browser:4444
    depends_on:
      - lattice-cast
      - browser
    networks:
      - shared-network
    tty: true
    stdin_open: true

  # Headless Chromium host. Runs `playwright run-server` so test-e2e can
  # remote-drive the browser via the BROWSER_WS endpoint. The Playwright
  # Python image bundles browser binaries but NOT the pip package, so a
  # tiny Dockerfile.browser layers `pip install playwright` on top.
  browser:
    profiles:
      - test
    build:
      context: ./test-e2e
      dockerfile: Dockerfile.browser
    volumes:
      - ./.browser:/output
    environment:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    networks:
      - shared-network

networks:
  app-network:
    driver: bridge

  shared-network:
    external: true

volumes:
  db_data:
  valkey_data:
