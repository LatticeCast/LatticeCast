services:
  lattice-cast:
    image: nginx:alpine
    ports:
      - "${NGX_PORT}:${NGX_PORT}"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      LISTEN_PORT: ${NGX_PORT}
      NGX_PORT: ${NGX_PORT}
    depends_on:
      - frontend
      - backend
    networks:
      - shared-network

  frontend:
    build:
      context: ./frontend
      network: host
      args:
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - AUTHENTIK_URL=${AUTHENTIK_URL}
        - AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}
    env_file:
      - .env
    networks:
      - shared-network
    command: npm run dev
    tty: true
    stdin_open: true
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
      network: host
    volumes:
      - ./backend/:/app/
    env_file:
      - .env
    environment:
      POSTGRES_URL: db:5432
      REDIS_URL: redis://valkey:6379/0
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "50"
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - shared-network
      - app-network

  db:
    image: postgres:18
    command: >
      postgres
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql.log
      -c log_statement=all
      -c log_connections=on
      -c log_disconnections=on
    environment:
      POSTGRES_USER: dba_user
      POSTGRES_PASSWORD: dba_pws
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "15432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dba_user -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # See Skill(developing-db-sql) for migration commands (lint/test/apply/hash).
  migration:
    profiles:
      - migration
    build:
      context: ./migration
      network: host
    environment:
      DATABASE_URL: postgresql://dba_user:dba_pws@db:5432/${POSTGRES_DB}
      TEST_NETWORK: latticecast_app-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./migration:/jetbase
    command: ["python", "migrate.py"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    volumes:
      - .minio_data:/data
    env_file:
      - .env
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # E2E test runner — uv image, has Playwright (client lib) + requests.
  # No browsers installed here; chromium runs in the `browser` service
  # and e2e connects to it via `sync_playwright().chromium.connect()`.
  e2e:
    profiles:
      - test
    build:
      context: ./e2e
      network: host
    volumes:
      - ./e2e:/scripts
    env_file:
      - .env
    environment:
      # E2E targets — override in .env to test against staging/prod.
      # Defaults assume local dev with `network_mode: host` below, so
      # `localhost:${NGX_PORT}` inside the container IS the host's nginx,
      # identical to what a real developer hits in their browser.
      BASE_URL: ${E2E_BASE_URL:-http://localhost:${NGX_PORT}}
      # Browser's playwright run-server is also on host network → localhost.
      BROWSER_WS: ${E2E_BROWSER_WS:-ws://localhost:4444}
    # Bridge straight to host network — same network namespace as the
    # developer's machine. Tests run exactly like a real user: open
    # http://localhost:${NGX_PORT}/, FE fetches http://localhost:${NGX_PORT}/api/...
    network_mode: host
    depends_on:
      - lattice-cast
      - browser
    tty: true
    stdin_open: true

  # Headless Chromium host. Runs `playwright run-server` on :4444 so the
  # e2e container can remote-drive it. Also shares the host network
  # so the FE running inside Chromium can fetch http://localhost:13491/api/...
  # exactly like the developer's local browser would.
  #
  # mem_limit + cpus: a buggy e2e test can put Chromium into a
  # pathological case (infinite re-render, leaked contexts, runaway
  # memory). Without a cap, the host gets starved and the entire
  # bot run hangs. With these limits, Chromium is OOM-killed when it
  # exceeds them — playwright run-server dies, e2e gets a
  # connect/protocol error, worker.sh's ERR trap flips the ticket to
  # debugging, and the orchestrator advances to the next one. Host
  # stays alive regardless of what the test does.
  browser:
    profiles:
      - test
    build:
      context: ./e2e
      dockerfile: Dockerfile.browser
      network: host
    volumes:
      - ./.browser:/output
    environment:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    mem_limit: 2g
    cpus: 2.0
    network_mode: host

networks:
  app-network:
    driver: bridge

  shared-network:
    external: true

volumes:
  db_data:
  valkey_data:
